name: Günlük veri üretimi

on:
  schedule:
    # Her gün 03:00 UTC = 06:00 Türkiye saati
    - cron: "0 3 * * *"
  workflow_dispatch: {}   # elle tetikleme (Actions sekmesinden "Run workflow")

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıklar
        run: pip install pandas numpy

      - name: Yeni gün verisi üret
        run: python generate_daily.py

      - name: Commit & push
        run: |
          git config user.name "data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/fact.csv
          git diff --cached --quiet && echo "Değişiklik yok" && exit 0
          git commit -m "Günlük veri: $(date -u +%Y-%m-%d)"
          git push
